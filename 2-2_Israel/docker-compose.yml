services:
  # ==========================================
  # SERVIÇO 1: Backend (API FastAPI)
  # ==========================================
  api:
    build: .
    container_name: shield_ia_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # Injeta as variáveis de ambiente carregadas do arquivo .env
      - PROVEDOR_LLM=${PROVEDOR_LLM}
      - MODELO_LLM=${MODELO_LLM}
      - CHAVE_DA_API=${CHAVE_DA_API}
      - OLLAMA_URL=${OLLAMA_URL}
      - TEMPO_LIMITE_INFERENCIA=${TEMPO_LIMITE_INFERENCIA}
    volumes:
      # Mapeia a pasta do banco para fora do Docker. 
      # Se o contêiner for destruído, o moderacao.db não é perdido.
      - ./codigo/banco:/app/codigo/banco
    command: >
      uvicorn codigo.api.app:app --host 0.0.0.0 --port 8000
    extra_hosts:
      # Truque de rede: Garante que o contêiner consiga acessar o Ollama rodando no seu Linux/Windows
      - "host.docker.internal:host-gateway"

  # ==========================================
  # SERVIÇO 2: Frontend (Painel Streamlit)
  # ==========================================
  frontend:
    build: .
    container_name: shield_ia_frontend
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      # O frontend fala com a API através da rede interna do Docker (usando o nome do serviço 'api')
      - API_URL=http://api:8000
    depends_on:
      - api
    command: >
      streamlit run codigo/aplicativo/app.py --server.port 8501 --server.address 0.0.0.0